<svg width="680" height="200" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Renewly lifecycle flow</title>
<desc>A user adds an item which is remembered, asks a question which is recalled, rates a reminder which improves the memory, and stale items are auto-forgotten.</desc>
<defs>
<marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="200" fill="#FBFBFA"/>
<g>
<rect x="40" y="100" width="100" height="56" rx="8" fill="#DCEBFF" stroke="#3B82F6" stroke-width="0.5"/>
<text x="90" y="123" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Add item</text>
<text x="90" y="141" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">remember()</text>
</g>
<line x1="140" y1="128" x2="156" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arrow2)"/>
<g>
<rect x="160" y="100" width="140" height="56" rx="8" fill="#DFF5F0" stroke="#14B8A6" stroke-width="0.5"/>
<text x="230" y="123" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Ask a question</text>
<text x="230" y="141" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">recall()</text>
</g>
<line x1="300" y1="128" x2="316" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arrow2)"/>
<g>
<rect x="320" y="100" width="130" height="56" rx="8" fill="#FCEFD6" stroke="#E8A33D" stroke-width="0.5"/>
<text x="385" y="123" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Give feedback</text>
<text x="385" y="141" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">improve()</text>
</g>
<line x1="450" y1="128" x2="466" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arrow2)"/>
<g>
<rect x="470" y="100" width="130" height="56" rx="8" fill="#FBE2DF" stroke="#DC6B5F" stroke-width="0.5"/>
<text x="535" y="123" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Auto cleanup</text>
<text x="535" y="141" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">forget()</text>
</g>
<text x="385" y="80" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">refines future recall</text>
</svg>
