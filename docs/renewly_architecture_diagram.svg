<svg width="680" height="330" viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Renewly architecture</title>
<desc>User talks to an interface layer, which calls Cognee's memory layer (local or cloud), which in turn calls an LLM for embeddings and reasoning.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="330" fill="#FBFBFA"/>
<g>
<rect x="100" y="30" width="420" height="260" rx="20" fill="#EDEBFF" stroke="#6E5BFF" stroke-width="0.5"/>
<text x="130" y="55" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Renewly backend</text>
<text x="130" y="72" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">Python service</text>
</g>
<g>
<rect x="130" y="100" width="170" height="56" rx="12" fill="#DCEBFF" stroke="#3B82F6" stroke-width="0.5"/>
<text x="215" y="123" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Interface layer</text>
<text x="215" y="141" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">CLI or API</text>
</g>
<g>
<rect x="340" y="100" width="170" height="56" rx="12" fill="#F0E4FF" stroke="#8B5CF6" stroke-width="0.5"/>
<text x="425" y="123" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#1D1D1F">Cognee memory</text>
<text x="425" y="141" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">Local or cloud</text>
</g>
<line x1="300" y1="128" x2="336" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="40" y="132" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">User</text>
<line x1="76" y1="128" x2="126" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="540" y="132" font-family="Inter, -apple-system, sans-serif" font-size="12" fill="#1D1D1F" opacity="0.6">LLM (OpenAI)</text>
<line x1="510" y1="128" x2="536" y2="128" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
</svg>
